# Manual backup generator. Production generation runs in the Cloudflare
# Container (see container/), woken by the Worker cron every 15 minutes.
# Trigger this from the Actions tab if you ever need a manual run.
name: watch for deaths (manual backup)

on:
  workflow_dispatch: {}   # manual "Run workflow" button in the Actions tab

permissions:
  contents: write

concurrency:
  group: watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: check for new deaths
        env:
          WIKIMEDIA_TOKEN: ${{ secrets.WIKIMEDIA_TOKEN }}   # optional, raises rate limit
          WORKER_URL: ${{ secrets.WORKER_URL }}             # e.g. https://the-other-half.you.workers.dev
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: |
          if [ -n "$WORKER_URL" ]; then
            python watcher.py --publish   # upload to the Cloudflare worker (D1 + R2)
          else
            python watcher.py --once      # legacy: commit into the repo
          fi

      - name: commit new edits
        run: |
          if [ -n "$(git status --porcelain site/)" ]; then
            git config user.name "the-other-half bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add site/
            git commit -m "rip: new edit(s) — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "everyone on the list is still alive"
          fi
